<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - INAMI</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="login-overlay active" id="resetOverlay">
    <div class="login-card" role="dialog" aria-modal="true" aria-label="Reset Password">
      <div class="mb-3">
        <i class="fas fa-lock fa-3x" style="color:var(--tsirip-primary)"></i>
        <h5 class="mt-2">Reset Password</h5>
      </div>

      <form id="resetPasswordForm">
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="resetPassword" placeholder="New Password" required>
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="resetPassword2" placeholder="Confirm New Password" required>
        </div>

        <div id="resetError" class="small mt-2 text-danger" style="display:none;"></div>
        <div id="resetSuccess" class="small mt-2 text-success" style="display:none;"></div>

        <div class="d-grid mb-2 mt-3">
          <button class="btn btn-primary" type="submit">Reset Password</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/reset-password.js"></script>
</body>
</html>
